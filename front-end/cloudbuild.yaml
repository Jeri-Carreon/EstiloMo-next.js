substitutions:
  _REGION: asia-southeast1
  _ARTIFACT_REPO: estilomo
  _IMAGE_NAME: estilomo-next-js
  _SERVICE_NAME: estilomo-next-js

  # ── Build-time (baked into the JS bundle — only these need NEXT_PUBLIC_) ──
  _NEXT_PUBLIC_SUPABASE_URL: ""
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
  _NEXT_PUBLIC_APP_URL: "https://estilomo.codeegoh.com"

  # ── Runtime-only (server-side, never shipped to the browser) ──
  _APP_URL: "https://estilomo.codeegoh.com"
  _DATABASE_URL: ""
  _DIRECT_URL: ""
  _SUPABASE_SERVICE_ROLE_KEY: ""
  _PAYMONGO_SECRET_KEY: ""
  _PENDING_CHECKOUT_EXPIRATION_MINUTES: "5"
  _OPENAI_API_KEY: ""
  _RESEND_API_KEY: ""
  _CRON_SECRET: ""

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # ── Step 1: Fail fast if required substitutions are missing ──
  - name: gcr.io/cloud-builders/gcloud
    id: Check substitutions
    entrypoint: bash
    args:
      - -c
      - |
        missing=0
        check_value() {
          name="$$1"
          value="$$2"
          if [ -z "$$value" ]; then
            echo "$$name=MISSING"
            missing=1
          else
            echo "$$name=SET"
          fi
        }

        check_value "_NEXT_PUBLIC_SUPABASE_URL" "${_NEXT_PUBLIC_SUPABASE_URL}"
        check_value "_NEXT_PUBLIC_SUPABASE_ANON_KEY" "${_NEXT_PUBLIC_SUPABASE_ANON_KEY}"
        check_value "_NEXT_PUBLIC_APP_URL" "${_NEXT_PUBLIC_APP_URL}"
        check_value "_APP_URL" "${_APP_URL}"
        check_value "_DATABASE_URL" "${_DATABASE_URL}"
        check_value "_DIRECT_URL" "${_DIRECT_URL}"
        check_value "_SUPABASE_SERVICE_ROLE_KEY" "${_SUPABASE_SERVICE_ROLE_KEY}"
        check_value "_OPENAI_API_KEY" "${_OPENAI_API_KEY}"
        check_value "_RESEND_API_KEY" "${_RESEND_API_KEY}"
        check_value "_CRON_SECRET" "${_CRON_SECRET}"

        if [ "$$missing" -ne 0 ]; then
          echo "Cloud Build substitutions are missing. Set them on the trigger or pass --substitutions when running manually."
          exit 1
        fi

  # ── Step 2: Build the image (only NEXT_PUBLIC_* values need to be build args) ──
  - name: gcr.io/cloud-builders/docker
    id: Build
    dir: front-end
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}:latest
      - .

  # ── Step 3: Push both tags to Artifact Registry ──
  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}

  # ── Step 4: Deploy to Cloud Run with explicit runtime env vars ──
  # Env vars set here persist on every future deploy automatically, unlike
  # ones added manually via the console (which get wiped by the next
  # auto-deploy).
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --quiet
      - >-
        --set-env-vars=^##^DATABASE_URL=${_DATABASE_URL}##DIRECT_URL=${_DIRECT_URL}##NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}##NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}##NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}##SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_KEY}##APP_URL=${_APP_URL}##PAYMONGO_SECRET_KEY=${_PAYMONGO_SECRET_KEY}##PENDING_CHECKOUT_EXPIRATION_MINUTES=${_PENDING_CHECKOUT_EXPIRATION_MINUTES}##OPENAI_API_KEY=${_OPENAI_API_KEY}##RESEND_API_KEY=${_RESEND_API_KEY}##CRON_SECRET=${_CRON_SECRET}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}:latest
